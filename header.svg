<svg xmlns="http://www.w3.org/2000/svg" width="900" height="120" viewBox="0 0 900 120">
  <defs>
    <!-- Dégradé rouge -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5555;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effet -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="900" height="120" fill="#0d1117"/>

  <!-- Bordure stylée -->
  <rect x="10" y="10" width="880" height="100" rx="10" ry="10"
        fill="none" stroke="url(#grad)" stroke-width="2"/>

  <!-- Ligne décorative -->
  <line x1="30" y1="40" x2="870" y2="40" stroke="url(#grad)" stroke-width="1"/>
  <line x1="30" y1="80" x2="870" y2="80" stroke="url(#grad)" stroke-width="1"/>

  <!-- Icône terminal -->
  <text x="40" y="70" font-size="20" fill="#ff4444" filter="url(#glow)">
    ▶
  </text>

  <!-- Texte principal -->
  <text x="80" y="70"
        font-family="'Fira Code', 'Courier New', monospace"
        font-size="18"
        fill="url(#grad)"
        filter="url(#glow)">
    khalil@esp-dakar ~ kali-linux ~ zsh
  </text>

  <!-- Dragon Kali (simple stylisé) -->
  <text x="820" y="70" font-size="20" fill="#ff4444" filter="url(#glow)">
    🐉
  </text>
</svg>
